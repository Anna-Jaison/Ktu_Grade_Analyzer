<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="black" stroke-width="30"/>
  
  <!-- Computer/Monitor screen -->
  <rect x="140" y="140" width="232" height="170" rx="8" fill="none" stroke="black" stroke-width="25"/>
  
  <!-- Monitor stand/base -->
  <rect x="220" y="310" width="72" height="40" fill="black"/>
  <rect x="200" y="345" width="112" height="20" fill="black" rx="4"/>
  
  <!-- Graduation cap on top left -->
  <g transform="translate(90, 90)">
    <!-- Cap top -->
    <polygon points="20,0 40,0 35,15 5,15" fill="black"/>
    <!-- Cap visor -->
    <rect x="-5" y="15" width="50" height="8" fill="black" rx="2"/>
    <!-- Tassel -->
    <line x1="30" y1="23" x2="30" y2="50" stroke="black" stroke-width="4"/>
  </g>
  
  <!-- Plus sign for grades -->
  <g transform="translate(380, 100)">
    <line x1="0" y1="-25" x2="0" y2="25" stroke="black" stroke-width="20" stroke-linecap="round"/>
    <line x1="-25" y1="0" x2="25" y2="0" stroke="black" stroke-width="20" stroke-linecap="round"/>
  </g>
</svg>