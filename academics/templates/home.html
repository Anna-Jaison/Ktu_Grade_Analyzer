{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .hero-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 5rem;
        align-items: center;
        min-height: calc(100vh - 6rem);
        position: relative;
    }

    /* Page-specific decorative dotted paths */
    .bg-dots {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        opacity: 0.4;
    }

    .hero-content {
        max-width: 600px;
        position: relative;
        z-index: 1;
    }

    .hero-image-container {
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1;
    }

    .hero-image {
        width: 100%;
        max-width: 520px;
        height: auto;
        border-radius: var(--radius-lg);
        filter: drop-shadow(0 25px 50px rgba(15, 23, 42, 0.12));
        transition: var(--transition);
    }

    .hero-image:hover {
        transform: translateY(-8px) scale(1.02);
    }

    .hero-badge {
        display: inline-flex;
        align-items: center;
        background: var(--primary-light);
        color: var(--primary);
        padding: 0.5rem 1.2rem;
        border-radius: 999px;
        font-weight: 800;
        font-size: 0.75rem;
        margin-bottom: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        border: 1px solid rgba(79, 70, 229, 0.1);
    }

    .hero-title {
        font-size: clamp(2.5rem, 5vw, 4rem);
        line-height: 1.1;
        margin-bottom: 1rem;
        color: var(--text-main);
        font-weight: 800;
    }

    .text-gradient {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
    }

    .hero-description {
        font-size: 1.1rem;
        color: var(--text-dim);
        margin-bottom: 1.5rem;
        line-height: 1.5;
    }

    .selection-card {
        padding: 2rem;
        background: white;
        border-radius: var(--radius-lg);
        border: 1px solid var(--border-thin);
        box-shadow: var(--shadow-lg);
        transition: var(--transition);
    }

    .selection-card:hover {
        border-color: var(--primary);
        box-shadow: 0 25px 50px -12px rgba(15, 23, 42, 0.15);
    }

    @media (max-width: 1024px) {
        .hero-grid {
            grid-template-columns: 1fr;
            gap: 4rem;
            text-align: center;
            padding-top: 5rem;
        }
        .hero-content {
            max-width: 100%;
            margin: 0 auto;
        }
        .hero-image {
            max-width: 450px;
        }
    }
</style>

<div class="container">
    <div class="hero-grid">
        <!-- Page-specific SVG Decorative Dotted Lines: Sync of Dotted Lines -->
        <svg class="bg-dots" viewBox="0 0 1000 1000" xmlns="http://www.w3.org/2000/svg">
            <path d="M-100,200 Q400,0 1100,300" fill="none" stroke="var(--primary)" stroke-width="1.2" stroke-dasharray="8 12" opacity="0.6" />
            <path d="M-100,800 Q300,1000 1100,700" fill="none" stroke="var(--secondary)" stroke-width="1.2" stroke-dasharray="6 10" opacity="0.5" />
            <path d="M200,100 C400,400 600,600 800,900" fill="none" stroke="var(--primary)" stroke-width="1" stroke-dasharray="10 20" opacity="0.3" />
            <circle cx="50" cy="50" r="100" fill="none" stroke="var(--primary)" stroke-width="1" stroke-dasharray="5 5" opacity="0.2" />
            <circle cx="950" cy="950" r="150" fill="none" stroke="var(--secondary)" stroke-width="1" stroke-dasharray="10 10" opacity="0.2" />
        </svg>

        <div class="hero-content animate-fade-in">
            <span class="hero-badge">KTU Grade Analyzer</span>
            <h1 class="hero-title">KTU <span class="text-gradient">Grade Analyzer.</span></h1>
            <p class="hero-description">Low internals? Know exactly what you need to score.</p>
            
            <div class="selection-card">
                <form method="post" action="/subjects/">
                    {% csrf_token %}
                    
                    <div class="input-group">
                        <label class="input-label">Department</label>
                        <select name="department" required>
                            <option value="">Select Department</option>
                            {% for d in departments %}
                                <option value="{{ d.name }}">{{ d.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                        <div class="input-group">
                            <label class="input-label">Scheme</label>
                            <select name="scheme" required>
                                <option value="">Select Scheme</option>
                                {% for s in schemes %}
                                    <option value="{{ s.year }}">{{ s.year }}</option>
                                {% endfor %}
                            </select>
                        </div>

                        <div class="input-group">
                            <label class="input-label">Semester</label>
                            <select name="semester" required>
                                <option value="">Select Semester</option>
                                {% for i in "12345678" %}
                                    <option value="{{ i }}">Semester {{ i }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                        Analyze my marks
                        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12.5 5L17.5 10M17.5 10L12.5 15M17.5 10H2.5" />
                        </svg>
                    </button>
                </form>
            </div>
        </div>

        <div class="hero-image-container animate-fade-in" style="animation-delay: 0.2s;">
            <img src="{% static 'hero_illustration.jpg' %}" 
                 alt="Student Analysis Illustration" 
                 class="hero-image"
                 style="display: block; width: 100%; height: auto; min-height: 200px; object-fit: contain;">
        </div>
    </div>
</div>
{% endblock %}
