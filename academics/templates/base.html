{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTU Analyzer</title>
    <link rel="icon" type="image/png" href="{% static 'favicon.png' %}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lexend+Deca:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #F8FAFC;
            --surface: #FFFFFF;
            --primary: #4F46E5;
            --primary-light: #EEF2FF;
            --secondary: #3B82F6;
            --secondary-light: #EFF6FF;
            --accent: #10B981;
            --text-main: #0F172A;
            --text-dim: #64748B;
            --border-thin: rgba(15, 23, 42, 0.08);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px -2px rgba(15, 23, 42, 0.08);
            --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.05);
            --radius-lg: 32px;
            --radius-md: 16px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 0% 0%, rgba(79, 70, 229, 0.04) 0%, transparent 40%),
                        radial-gradient(circle at 100% 0%, rgba(59, 130, 246, 0.04) 0%, transparent 40%),
                        radial-gradient(circle at 50% 100%, rgba(16, 185, 129, 0.02) 0%, transparent 40%),
                        var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Global Decorative Background Elements */
        .bg-decor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.6;
        }

        h1, h2, h3, h4, .heading-font {
            font-family: 'Lexend Deca', sans-serif;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            width: 100%;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-thin);
            box-shadow: var(--shadow-md);
            padding: 2.5rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.875rem 2rem;
            background: var(--primary);
            color: white;
            border-radius: 40px;
            font-weight: 600;
            font-family: 'Lexend Deca', sans-serif;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            cursor: pointer;
            gap: 0.5rem;
        }

        .btn-primary:hover {
            background: #4338CA;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3);
        }

        .input-group {
            margin-bottom: 1.5rem;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-dim);
            margin-bottom: 0.5rem;
        }

        select, input[type="number"], input[type="text"] {
            width: 100%;
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-thin);
            background: #F3F4F6;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.2s;
            outline: none;
            appearance: none;
        }

        select:focus, input[type="number"]:focus, input[type="text"]:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px var(--primary-light);
        }

        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-success { background: #D1FAE5; color: #065F46; }
        .badge-error { background: #FEE2E2; color: #991B1B; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }
    </style>
</head>
<body>

    <!-- Global Background Decorations: Sync of Dotted Lines -->
    <svg class="bg-decor" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <!-- Floating Dotted Curves -->
        <path d="M-100,200 Q200,50 600,300 T1300,100" fill="none" stroke="var(--primary)" stroke-width="1.2" stroke-dasharray="8 12" opacity="0.3" />
        <path d="M1300,600 Q900,800 500,500 T-100,700" fill="none" stroke="var(--secondary)" stroke-width="1.2" stroke-dasharray="6 10" opacity="0.25" />
        <path d="M-50,0 Q300,400 0,800" fill="none" stroke="var(--primary)" stroke-width="1" stroke-dasharray="10 15" opacity="0.15" />
        
        <!-- Symmetrical Decorative Circles -->
        <circle cx="1100" cy="100" r="120" fill="none" stroke="var(--primary)" stroke-width="1" stroke-dasharray="10 10" opacity="0.15" />
        <circle cx="100" cy="750" r="180" fill="none" stroke="var(--secondary)" stroke-width="1.2" stroke-dasharray="15 15" opacity="0.15" />
        <circle cx="600" cy="400" r="300" fill="none" stroke="var(--primary)" stroke-width="0.5" stroke-dasharray="20 40" opacity="0.1" />
        <circle cx="1200" cy="800" r="200" fill="none" stroke="var(--secondary)" stroke-width="1" stroke-dasharray="5 10" opacity="0.1" />
    </svg>

    {% block content %}
    {% endblock %}

</body>
</html>
